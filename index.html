function getResult(answers) {
  const score = {creation:0, social:0, local:0};
  QUESTIONS.forEach(q => {
    if (answers[q.id] === true)  score[q.axis]++;
    else if (answers[q.id] === false) score[q.axis]--;
  });
  const axes = {
    creation: score.creation >= 0,
    social:   score.social   >= 0,
    local:    score.local    >= 0,
  };
  return TYPES.find(t =>
    t.axes.creation === axes.creation &&
    t.axes.social   === axes.social   &&
    t.axes.local    === axes.local
  );
}

// ── helpers ──

function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k === 'onclick') e.addEventListener('click', v);
    else if (k === 'href') { e.href = v; }
    else if (k === 'target') e.target = v;
    else if (k === 'rel') e.rel = v;
    else if (k === 'className') e.className = v;
    else e.setAttribute(k, v);
  }
  children.flat().forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}

function div(style={}, ...children) { return el('div', {style}, ...children); }
function span(style={}, text) { return el('span', {style}, text); }
function p(style={}, text) { return el('p', {style}, text); }
function tag(text, color, bg) {
  return span({
    fontSize:'12px', padding:'3px 9px', borderRadius:'4px',
    background: bg || color+'18', color,
    fontFamily:'Noto Sans KR,sans-serif', fontWeight:'600',
  }, text);
}
function chip(text, color, bg) {
  return span({
    fontSize:'12px', padding:'3px 9px', borderRadius:'4px',
    background: bg || '#F5F0E8', color: color || '#5A4A3A',
    fontFamily:'Noto Sans KR,sans-serif',
    display:'inline-block', marginRight:'6px', marginBottom:'6px',
  }, text);
}

function sectionLabel(text) {
  return p({
    fontSize:'11px', letterSpacing:'0.14em', color:'#9A8878',
    fontFamily:'sans-serif', textTransform:'uppercase', marginBottom:'10px',
  }, text);
}

function card(style={}, ...children) {
  return div({
    background:'#fff', borderRadius:'16px', padding:'20px 22px',
    border:'1px solid #EDE8DF', ...style,
  }, ...children);
}

  hero.append(bgText, eyebrow, title, desc);

  // Type grid
  const grid = div({
    display:'grid', gridTemplateColumns:'repeat(4,1fr)',
    gap:'8px', marginBottom:'20px',
  });
  TYPES.forEach(t => {
    const cell = div({
      background:t.bg, borderRadius:'12px', padding:'12px 8px',
      textAlign:'center', border:`1px solid ${t.color}22`,
    });
    cell.append(
      div({fontSize:'22px', marginBottom:'4px'}, t.emoji),
      div({
        fontSize:'11px', color:t.color, fontFamily:'Noto Sans KR,sans-serif',
        fontWeight:'600', lineHeight:'1.3',
      }, t.name)
    );
    grid.appendChild(cell);
  });

  // Info bar
  const info = div({
    display:'flex', gap:'8px', marginBottom:'20px',
    padding:'14px 16px', background:'#fff',
    borderRadius:'12px', border:'1px solid #EDE8DF',
  });
  [['🎯','12문항'],['⏱️','약 3분'],['🔒','저장 안 됨']].forEach(([ic,lb]) => {
    const item = div({flex:'1', textAlign:'center', fontSize:'13px', fontFamily:'sans-serif', color:'#6A5A4A'});
    item.append(div({fontSize:'18px',marginBottom:'3px'}, ic), document.createTextNode(lb));
    info.appendChild(item);
  });

  // Start button
  const btn = el('button', {
    onclick: () => { state.screen='quiz'; state.currentIdx=0; state.answers={}; render(); },
    style: {
      width:'100%', padding:'18px',
      borderRadius:'14px',
      background:'#C1440E', color:'#fff',
      fontSize:'16px', fontWeight:'700',
      letterSpacing:'0.04em',
      boxShadow:'0 4px 16px rgba(193,68,14,0.30)',
      transition:'transform 0.15s, box-shadow 0.15s',
    }
  }, '테스트 시작하기 →');
  btn.addEventListener('mouseenter', () => { btn.style.transform='translateY(-2px)'; btn.style.boxShadow='0 6px 20px rgba(193,68,14,0.38)'; });
  btn.addEventListener('mouseleave', () => { btn.style.transform=''; btn.style.boxShadow='0 4px 16px rgba(193,68,14,0.30)'; });

  // PCCF credit
  const credit = div({
    textAlign:'center', marginTop:'20px',
    fontSize:'12px', color:'#B0A090', fontFamily:'sans-serif',
  }, '평택시문화재단 생활문화팀 제공');

  wrap.append(hero, grid, info, btn, credit);
  return wrap;
}

// ── QUIZ ──

function renderQuiz() {
  const q = QUESTIONS[state.currentIdx];
  const answered = Object.keys(state.answers).length;

  const wrap = div({});

  // Progress
  const pct = Math.round((answered / TOTAL) * 100);
  const progWrap = div({marginBottom:'24px'});
  const progRow = div({display:'flex', justifyContent:'space-between', marginBottom:'7px'});
  progRow.append(
    span({fontSize:'12px', color:'#9A8878', fontFamily:'sans-serif'}, `${answered} / ${TOTAL}`),
    span({fontSize:'12px', color:'#9A8878', fontFamily:'sans-serif'}, `${pct}%`)
  );
  const track = div({height:'4px', background:'#EDE8DF', borderRadius:'99px', overflow:'hidden'});
  const fill = div({
    height:'100%', width:`${pct}%`,
    background:'linear-gradient(90deg,#C1440E,#D97706)',
    borderRadius:'99px', transition:'width 0.4s ease',
  });
  track.appendChild(fill);
  progWrap.append(progRow, track);

  // Question
  const qWrap = div({className:'fade-up'});
  const qNum = p({
    fontSize:'11px', letterSpacing:'0.18em', color:'#C1440E',
    fontFamily:'sans-serif', marginBottom:'10px', textTransform:'uppercase',
  }, `Q ${state.currentIdx + 1}`);
  const qText = el('h2', {style:{
    fontSize:'clamp(16px,4vw,20px)', fontWeight:'700',
    color:'#1A1209', lineHeight:'1.55', marginBottom:'26px',
    fontFamily:'Noto Serif KR,Georgia,serif',
  }}, q.text);

  const opts = div({display:'flex', flexDirection:'column', gap:'12px'});

  [q.a, q.b].forEach(opt => {
    const btn = el('button', {
      onclick: () => handleAnswer(q.id, opt.value),
      style: {
        display:'flex', alignItems:'center', gap:'16px',
        padding:'17px 20px', borderRadius:'12px',
        border:'2px solid #E8E2D8', background:'#fff',
        textAlign:'left', width:'100%',
        transition:'all 0.2s',
        boxShadow:'0 1px 4px rgba(0,0,0,0.04)',
      }
    });
    const emo = span({fontSize:'28px', flexShrink:'0'}, opt.emoji);
    const lbl = span({
      fontSize:'15px', color:'#3A2E22',
      fontFamily:'Noto Sans KR,sans-serif', lineHeight:'1.5',
    }, opt.label);
    btn.append(emo, lbl);
    btn.addEventListener('mouseenter', () => {
      btn.style.borderColor = '#C1440E';
      btn.style.background = '#FDF3EE';
      lbl.style.color = '#C1440E';
    });
    btn.addEventListener('mouseleave', () => {
      btn.style.borderColor = '#E8E2D8';
      btn.style.background = '#fff';
      lbl.style.color = '#3A2E22';
    });
    opts.appendChild(btn);
  });

  qWrap.append(qNum, qText, opts);
  wrap.append(progWrap, qWrap);
  return wrap;
}

function handleAnswer(id, val) {
  state.answers[id] = val;
  if (state.currentIdx + 1 < TOTAL) {
    state.currentIdx++;
    render();
  } else {
    state.result = getResult(state.answers);
    state.screen = 'result';
    render();
    window.scrollTo({top:0, behavior:'smooth'});
  }
}

// ── RESULT ──

function renderResult() {
  const t = state.result;
  const wrap = div({className:'fade-up'});

  // Hero
  const hero = div({
    background:t.color, borderRadius:'20px',
    padding:'32px 24px 24px', marginBottom:'16px',
    position:'relative', overflow:'hidden',
  });
  const bgEmo = div({
    position:'absolute', top:'-20px', right:'-20px',
    fontSize:'130px', opacity:'0.12', lineHeight:'1',
    pointerEvents:'none', userSelect:'none',
  }, t.emoji);
  const eyebrow = p({
    fontSize:'11px', letterSpacing:'0.2em', color:'rgba(255,255,255,0.55)',
    fontFamily:'sans-serif', marginBottom:'8px', textTransform:'uppercase',
  }, '당신의 생활문화 유형');
  const nameRow = div({display:'flex', alignItems:'center', gap:'14px', marginBottom:'12px'});
  nameRow.append(
    span({fontSize:'48px'}, t.emoji),
    (() => {
      const d = div({});
      d.append(
        el('h2', {style:{
          fontSize:'clamp(22px,5vw,32px)', fontWeight:'800',
          color:'#fff', lineHeight:'1.15',
          fontFamily:'Noto Serif KR,Georgia,serif',
        }}, t.name),
        span({fontSize:'12px', color:'rgba(255,255,255,0.55)', fontFamily:'sans-serif'}, t.code)
      );
      return d;
    })()
  );
  const tl = p({
    fontSize:'15px', color:'rgba(255,255,255,0.88)', fontStyle:'italic',
    fontFamily:'Noto Serif KR,Georgia,serif', lineHeight:'1.5',
    borderLeft:'3px solid rgba(255,255,255,0.35)', paddingLeft:'14px',
  }, `"${t.tagline}"`);
  hero.append(bgEmo, eyebrow, nameRow, tl);

  // Description
  const descCard = card({marginBottom:'14px'});
  descCard.appendChild(p({
    fontSize:'15px', lineHeight:'1.85', color:'#3A2E22',
    fontFamily:'Noto Sans KR,sans-serif',
  }, t.description));

  // Axes
  const axesCard = card({marginBottom:'14px'});
  axesCard.appendChild(sectionLabel('성향 지표'));
  const axDefs = [
    {key:'creation', trueL:'창조형', falseL:'수용형'},
    {key:'social',   trueL:'사교형', falseL:'독립형'},
    {key:'local',    trueL:'로컬형', falseL:'유목형'},
  ];
  axDefs.forEach(({key, trueL, falseL}) => {
    const val = t.axes[key];
    const row = div({marginBottom:'14px'});
    const labels = div({display:'flex', justifyContent:'space-between', marginBottom:'6px'});
    labels.append(
      span({fontSize:'13px', fontFamily:'sans-serif',
        color: val ? '#9A8878' : '#1A1209',
        fontWeight: val ? '400' : '700'}, falseL),
      span({fontSize:'13px', fontFamily:'sans-serif',
        color: val ? '#1A1209' : '#9A8878',
        fontWeight: val ? '700' : '400'}, trueL)
    );
    const track = div({height:'6px', background:'#EDE8DF', borderRadius:'99px', overflow:'hidden', position:'relative'});
    const bar = div({
      height:'100%', width: val ? '68%' : '32%',
      background: t.color, borderRadius:'99px',
      position:'absolute', right: val ? '0' : 'auto', left: val ? 'auto' : '0',
    });
    track.appendChild(bar);
    row.append(labels, track);
    axesCard.appendChild(row);
  });

  // Keywords & traits
  const grid2 = div({display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', marginBottom:'14px'});
  const kwCard = card({});
  kwCard.appendChild(sectionLabel('키워드'));
  const kwRow = div({});
  t.keywords.forEach(k => kwRow.appendChild(chip(k, t.color, t.bg)));
  kwCard.appendChild(kwRow);

  const trCard = card({});
  trCard.appendChild(sectionLabel('성향'));
  const trRow = div({});
  t.traits.forEach(tr => trRow.appendChild(chip(tr)));
  trCard.appendChild(trRow);
  grid2.append(kwCard, trCard);

  // Typical
  const typCard = card({marginBottom:'14px'});
  typCard.append(sectionLabel('이런 사람이 많아요'),
    p({fontSize:'14px', color:'#3A2E22', lineHeight:'1.65', fontFamily:'Noto Sans KR,sans-serif'}, t.typical));

  // Friends
  const friendCard = div({
    background:t.bg, borderRadius:'16px', padding:'18px 22px',
    border:`1px solid ${t.color}25`, marginBottom:'16px',
  });
  friendCard.appendChild(p({
    fontSize:'11px', letterSpacing:'0.12em', color:t.color,
    fontFamily:'sans-serif', textTransform:'uppercase', marginBottom:'10px',
  }, '다른 유형과의 관계'));
  t.friends.forEach(f => {
    friendCard.appendChild(p({
      fontSize:'13px', color:'#3A2E22', lineHeight:'1.6',
      fontFamily:'Noto Sans KR,sans-serif', marginBottom:'6px',
    }, '• ' + f));
  });

  // ── PCCF section ──
  const pccf = div({
    borderRadius:'20px', overflow:'hidden',
    border:'1px solid #E8E2D8', marginBottom:'16px',
  });

  // pccf header
  const pccfHead = div({
    background:'#1A1209', padding:'18px 20px',
    display:'flex', alignItems:'center', gap:'12px',
  });
  const pccfIcon = div({
    width:'36px', height:'36px', borderRadius:'8px',
    background:'#C1440E', display:'flex',
    alignItems:'center', justifyContent:'center',
    fontSize:'18px', flexShrink:'0', lineHeight:'1',
  }, '🏛️');
  const pccfTitleWrap = div({});
  pccfTitleWrap.append(
    p({fontSize:'11px', letterSpacing:'0.14em', color:'rgba(255,255,255,0.4)',
       fontFamily:'sans-serif', textTransform:'uppercase', marginBottom:'2px',
    }, 'Pyeongtaek Cultural Foundation'),
    p({fontSize:'15px', fontWeight:'700', color:'#FAF8F4',
       fontFamily:'Noto Serif KR,Georgia,serif',
    }, '평택시문화재단 생활문화팀')
  );
  pccfHead.append(pccfIcon, pccfTitleWrap);

  // Programs
  const programs = div({background:'#fff', padding:'16px 18px 4px'});
  programs.appendChild(sectionLabel('2025 주요 프로그램'));
  const progs = [
    {emoji:'🎪', title:'오픈큐브 6기 레지던시', desc:'안정리 예술인광장 입주작가·기획자 시민 창작 프로그램 (3~10월)', tag:'진행중', tc:'#16a34a'},
    {emoji:'🖼️', title:'기억 프로젝트 4th',    desc:'문화예술학교 연간 작품발표회 — 공예·판화·도자·디지털드로잉 등 12개 프로그램', tag:'전시', tc:'#2563EB'},
    {emoji:'🌿', title:'평택형 생활문화 프로그램', desc:'노을·생태 감수성, 1인 가구 대상 시민 참여 프로그램 기획 운영', tag:'기획중', tc:'#D97706'},
    {emoji:'🎭', title:'마토예술제',             desc:'평택시문화재단 대표 생활문화 축제 — 시민 참여·지역 예술인 협업', tag:'연간', tc:'#9333EA'},
  ];
  progs.forEach((pr, i) => {
    const row = div({
      display:'flex', gap:'12px', padding:'12px 0',
      borderBottom: i < 3 ? '1px solid #F0EBE3' : 'none',
    });
    const ico = div({
      width:'38px', height:'38px', borderRadius:'8px',
      background:'#FAF8F4', display:'flex',
      alignItems:'center', justifyContent:'center',
      fontSize:'18px', flexShrink:'0', lineHeight:'1',
    }, pr.emoji);
    const txt = div({flex:'1'});
    const titleRow = div({display:'flex', alignItems:'center', gap:'6px', marginBottom:'3px', flexWrap:'wrap'});
    titleRow.append(
      span({fontSize:'13px', fontWeight:'700', color:'#1A1209', fontFamily:'Noto Sans KR,sans-serif'}, pr.title),
      tag(pr.tag, pr.tc)
    );
    txt.append(titleRow,
      p({fontSize:'12px', color:'#7A6A58', lineHeight:'1.5', fontFamily:'Noto Sans KR,sans-serif'}, pr.desc)
    );
    row.append(ico, txt);
    programs.appendChild(row);
  });

  // Notion banner
  const notionLink = el('a', {
    href:'https://pccf.notion.site/2025',
    target:'_blank', rel:'noopener noreferrer',
    style:{
      display:'flex', alignItems:'center', justifyContent:'space-between',
      padding:'16px 20px',
      background:'linear-gradient(135deg,#C1440E 0%,#D97706 100%)',
    }
  });
  const nlLeft = div({display:'flex', alignItems:'center', gap:'12px'});
  const nlIco = div({
    width:'32px', height:'32px', borderRadius:'6px',
    background:'rgba(255,255,255,0.2)',
    display:'flex', alignItems:'center', justifyContent:'center', fontSize:'16px',
  }, '📋');
  const nlTxt = div({});
  nlTxt.append(
    p({fontSize:'13px', fontWeight:'700', color:'#fff',
       fontFamily:'Noto Sans KR,sans-serif', marginBottom:'1px',
    }, '2025 생활문화팀 전체 소식 보기'),
    p({fontSize:'11px', color:'rgba(255,255,255,0.65)', fontFamily:'sans-serif'}, 'pccf.notion.site')
  );
  nlLeft.append(nlIco, nlTxt);
  notionLink.append(nlLeft, span({fontSize:'18px', color:'rgba(255,255,255,0.8)'}, '→'));

  // Sub links
  const subLinks = div({display:'grid', gridTemplateColumns:'1fr 1fr 1fr', background:'#FAF8F4'});
  [
    {label:'공식 홈페이지', icon:'🌐', href:'https://www.pccf.or.kr'},
    {label:'카카오채널',    icon:'💬', href:'https://pf.kakao.com/_GbmJs'},
    {label:'대관 신청',    icon:'📅', href:'https://pccfrent.kr'},
  ].forEach((lk, i) => {
    const a = el('a', {
      href:lk.href, target:'_blank', rel:'noopener noreferrer',
      style:{
        display:'flex', flexDirection:'column', alignItems:'center',
        padding:'14px 8px',
        borderRight: i < 2 ? '1px solid #EDE8DF' : 'none',
        transition:'background 0.15s',
      }
    });
    a.append(
      span({fontSize:'18px', marginBottom:'4px'}, lk.icon),
      span({fontSize:'11px', color:'#6A5A4A', fontFamily:'sans-serif', textAlign:'center'}, lk.label)
    );
    a.addEventListener('mouseenter', () => a.style.background='#EEE8DF');
    a.addEventListener('mouseleave', () => a.style.background='');
    subLinks.appendChild(a);
  });

  pccf.append(pccfHead, programs, notionLink, subLinks);

  // Share button
  const shareBtn = el('button', {
    onclick: () => {
      if (navigator.share) {
        navigator.share({title:'내 생활문화 유형은 '+t.name+'!', text:t.tagline, url:window.location.href});
      } else {
        navigator.clipboard.writeText(window.location.href).then(() => {
          shareBtn.textContent = '✓ 링크 복사됨!';
          setTimeout(() => { shareBtn.textContent = '이 유형 공유하기 🔗'; }, 2000);
        });
      }
    },
    style:{
      width:'100%', padding:'15px',
      borderRadius:'12px', border:'2px solid #1A1209',
      background:'transparent', color:'#1A1209',
      fontSize:'15px', fontWeight:'700',
      letterSpacing:'0.03em', marginBottom:'12px',
      transition:'all 0.15s',
    }
  }, '이 유형 공유하기 🔗');
  shareBtn.addEventListener('mouseenter', () => { shareBtn.style.background='#1A1209'; shareBtn.style.color='#FAF8F4'; });
  shareBtn.addEventListener('mouseleave', () => { shareBtn.style.background='transparent'; shareBtn.style.color='#1A1209'; });

  // Retry
  const retryBtn = el('button', {
    onclick: () => { state.screen='intro'; state.answers={}; state.currentIdx=0; state.result=null; render(); window.scrollTo({top:0}); },
    style:{
      width:'100%', padding:'15px',
      borderRadius:'12px', border:'none',
      background:'#1A1209', color:'#FAF8F4',
      fontSize:'15px', fontWeight:'700',
      letterSpacing:'0.03em',
      transition:'opacity 0.15s',
    }
  }, '다시 테스트하기');
  retryBtn.addEventListener('mouseenter', () => retryBtn.style.opacity='0.8');
  retryBtn.addEventListener('mouseleave', () => retryBtn.style.opacity='1');

  wrap.append(hero, descCard, axesCard, grid2, typCard, friendCard, pccf, shareBtn, retryBtn);
  return wrap;
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
